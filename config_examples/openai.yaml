# Ejemplo: OpenAI. Copiar a configs/config.yaml para usar.
# Definir OPENAI_API_KEY en .env o en el entorno.
llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 1024

conversation:
  enabled: false
  max_messages: 10
  trim_when_over: 12
  summary_type: facts

agent:
  description: >
    Eres un agente de IA especialista en temas legales. Respondes en español,
    citas artículos relevantes cuando aplica y aclaras cuando no tienes
    información suficiente para dar una respuesta confiable.

vectorizer:
  enabled: true
  embedding_model: text-embedding-3-small
  collection_name: documents
  persist_directory: ./data/chroma
  chunk_size: 500
  chunk_overlap: 50
  top_k: 5
