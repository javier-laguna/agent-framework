# Ejemplo: Google Gemini. Copiar a configs/config.yaml para usar.
# Definir GEMINI_API_KEY en .env o en el entorno.
llm:
  provider: gemini
  model: gemini-2.0-flash
  temperature: 0.0
  max_tokens: 1024

conversation:
  enabled: false
  max_messages: 10
  trim_when_over: 12
  summary_type: facts

agent:
  description: >
    Eres un agente de IA generalista que responde en español y puede razonar
    paso a paso. Usa ejemplos breves cuando ayuden a entender mejor la respuesta.

vectorizer:
  enabled: true
  embedding_model: text-embedding-3-small
  collection_name: documents
  persist_directory: ./data/chroma
  chunk_size: 500
  chunk_overlap: 50
  top_k: 5
